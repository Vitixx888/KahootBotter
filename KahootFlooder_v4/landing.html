<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<title>KahootFlooder v3</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#080c0e;--bg2:#0c1214;--bg3:#101a1c;--border:#1a2a2e;--teal:#00e5c8;--teal2:#00b8a0;--teal-dim:rgba(0,229,200,0.08);--teal-glow:rgba(0,229,200,0.25);--carbon:#0e1618;--text:#c8dde0;--dim:#3a5560;--red:#ff3e6c;--yellow:#ffe046;--purple:#a78bfa;--orange:#ff6b00}
*{margin:0;padding:0;box-sizing:border-box}html,body{min-height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,200,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,200,0.035) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:900px;height:700px;background:radial-gradient(ellipse,rgba(0,229,200,0.055) 0%,transparent 65%);pointer-events:none;z-index:0}
.scanline{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,rgba(0,229,200,0.18),transparent);animation:scan 7s linear infinite;pointer-events:none;z-index:999}
@keyframes scan{0%{transform:translateY(-10px)}100%{transform:translateY(100vh)}}
.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:40px 28px 100px}

.header{text-align:center;padding:60px 0 50px}
.header-hex{display:inline-flex;align-items:center;justify-content:center;width:76px;height:76px;background:linear-gradient(135deg,var(--teal),var(--teal2));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);margin-bottom:22px;box-shadow:0 0 50px var(--teal-glow);animation:hexP 3s ease-in-out infinite}
@keyframes hexP{0%,100%{box-shadow:0 0 50px var(--teal-glow)}50%{box-shadow:0 0 90px rgba(0,229,200,0.5)}}
.header-hex svg{width:34px;height:34px;fill:#080c0e}
h1{font-family:'Orbitron',sans-serif;font-size:clamp(26px,5vw,54px);font-weight:900;letter-spacing:8px;color:var(--teal);text-shadow:0 0 50px var(--teal-glow);text-transform:uppercase;margin-bottom:8px}
h1 span{color:var(--text);opacity:0.35}
.sub{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:4px;color:var(--dim);text-transform:uppercase;margin-bottom:22px}
.badge{display:inline-block;background:var(--teal-dim);border:1px solid rgba(0,229,200,0.35);border-radius:4px;padding:5px 18px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--teal);animation:blink 2.5s infinite}
@keyframes blink{0%,100%{border-color:rgba(0,229,200,0.35)}50%{border-color:rgba(0,229,200,0.8)}}

.divider{display:flex;align-items:center;gap:16px;margin:44px 0 28px}
.div-line{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--border),transparent)}
.div-lbl{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:4px;color:var(--dim);text-transform:uppercase;white-space:nowrap}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid.two{grid-template-columns:repeat(2,1fr)}

.card{background:var(--carbon);border:1px solid var(--border);border-radius:12px;padding:22px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;text-decoration:none;display:block}
.card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 40px rgba(0,0,0,0.5)}
.card:hover::before{opacity:1}

.card.teal::before{background:linear-gradient(135deg,rgba(0,229,200,0.06),transparent)}
.card.teal:hover{border-color:rgba(0,229,200,0.45);box-shadow:0 10px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(0,229,200,0.12)}
.card.red::before{background:linear-gradient(135deg,rgba(255,62,108,0.06),transparent)}
.card.red:hover{border-color:rgba(255,62,108,0.45)}
.card.yellow::before{background:linear-gradient(135deg,rgba(255,224,70,0.06),transparent)}
.card.yellow:hover{border-color:rgba(255,224,70,0.45)}
.card.purple::before{background:linear-gradient(135deg,rgba(167,139,250,0.06),transparent)}
.card.purple:hover{border-color:rgba(167,139,250,0.45)}
.card.orange::before{background:linear-gradient(135deg,rgba(255,107,0,0.06),transparent)}
.card.orange:hover{border-color:rgba(255,107,0,0.45)}

.card.featured{grid-column:span 2;border-color:rgba(0,229,200,0.2)}
.card.featured::after{content:'MAIN';position:absolute;top:14px;right:14px;background:var(--teal);color:#080c0e;font-family:'Orbitron',sans-serif;font-size:8px;font-weight:900;letter-spacing:2px;padding:3px 9px;border-radius:3px}

.card-icon{width:46px;height:46px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px;position:relative;z-index:1}
.card-icon.teal{background:rgba(0,229,200,0.1);border:1px solid rgba(0,229,200,0.25)}
.card-icon.red{background:rgba(255,62,108,0.1);border:1px solid rgba(255,62,108,0.25)}
.card-icon.yellow{background:rgba(255,224,70,0.1);border:1px solid rgba(255,224,70,0.25)}
.card-icon.purple{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.25)}
.card-icon.orange{background:rgba(255,107,0,0.1);border:1px solid rgba(255,107,0,0.25)}

.card-title{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;position:relative;z-index:1}
.card.teal .card-title{color:var(--teal)}.card.red .card-title{color:var(--red)}.card.yellow .card-title{color:var(--yellow)}.card.purple .card-title{color:var(--purple)}.card.orange .card-title{color:var(--orange)}
.card-desc{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:14px;position:relative;z-index:1}
.tags{display:flex;gap:6px;flex-wrap:wrap;position:relative;z-index:1}
.tag{font-family:'Share Tech Mono',monospace;font-size:10px;padding:3px 8px;border-radius:3px;background:var(--bg3);border:1px solid var(--border);color:var(--dim)}
.tag.live{background:rgba(0,229,200,0.08);border-color:rgba(0,229,200,0.3);color:var(--teal)}
.card-arrow{position:absolute;bottom:18px;right:18px;width:28px;height:28px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px;transition:all .25s;z-index:1}
.card:hover .card-arrow{color:var(--teal);border-color:var(--teal);background:var(--teal-dim)}

.statusbar{position:fixed;bottom:0;left:0;right:0;background:rgba(8,12,14,0.96);border-top:1px solid var(--border);backdrop-filter:blur(12px);padding:10px 32px;display:flex;align-items:center;gap:24px;font-family:'Share Tech Mono',monospace;font-size:11px;z-index:100}
.sb-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px var(--teal);animation:pp 1.5s infinite;flex-shrink:0}
@keyframes pp{0%,100%{opacity:1}50%{opacity:.3}}
.sb-item{color:var(--dim);white-space:nowrap}.sb-item span{color:var(--teal)}.sb-sep{color:var(--border)}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="page">
  <div class="header">
    <div class="header-hex"><svg viewBox="0 0 24 24" stroke="#080c0e" stroke-width="2" fill="none"><polygon points="12,2 22,7 22,17 12,22 2,17 2,7"/><polyline points="12,22 12,12"/><polyline points="22,7 12,12"/><polyline points="2,7 12,12"/></svg></div>
    <h1>KAHOOT<span>FLOODER</span></h1>
    <div class="sub">// Advanced Session Toolkit v3.0</div>
    <div class="badge">⬤ 4 MODULE AKTIV</div>
  </div>

</div>

<div class="statusbar">
  <div class="sb-dot"></div>
  <div class="sb-item">STATUS: <span>ONLINE</span></div>
  <div class="sb-sep">|</div>
  <div class="sb-item">PORT: <span>7842</span></div>
  <div class="sb-sep">|</div>
  <div class="sb-item">MODULE: <span>6/6</span></div>
  <div class="sb-sep">|</div>
  <div class="sb-item" id="clock">TIME: <span>--:--:--</span></div>
</div>
<script>setInterval(()=>{const t=new Date().toTimeString().slice(0,8);document.getElementById('clock').innerHTML='TIME: <span>'+t+'</span>';},1000);</script>
</body>
</html>
