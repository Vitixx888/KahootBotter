<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"/><title>PIN Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#080c0e;--bg2:#0c1214;--bg3:#101a1c;--border:#1a2a2e;--teal:#00e5c8;--text:#c8dde0;--dim:#3a5560;--red:#ff3e6c;--yellow:#ffe046;--purple:#a78bfa;--orange:#ff6b00}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,107,0,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,107,0,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:-150px;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(255,107,0,0.04) 0%,transparent 70%);pointer-events:none;z-index:0}
.scanline{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,rgba(255,107,0,0.18),transparent);animation:scan 7s linear infinite;pointer-events:none;z-index:999}
@keyframes scan{0%{transform:translateY(-10px)}100%{transform:translateY(100vh)}}
.wrap{position:relative;z-index:1;display:grid;grid-template-columns:280px 1fr;height:100vh}
.left{background:rgba(12,18,20,0.96);border-right:1px solid var(--border);padding:14px;display:flex;flex-direction:column;gap:11px;overflow-y:auto}
.left::-webkit-scrollbar{width:3px}.left::-webkit-scrollbar-thumb{background:var(--border)}
.ph{display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.ph-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(255,107,0,0.12);border:1px solid rgba(255,107,0,0.3);flex-shrink:0}
.ph-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--orange)}
.home-link{margin-left:auto;font-size:9px;font-family:'Orbitron',sans-serif;letter-spacing:2px;color:var(--dim);text-decoration:none;border:1px solid var(--border);padding:4px 10px;border-radius:3px;transition:all .15s;flex-shrink:0}
.home-link:hover{border-color:var(--teal);color:var(--teal)}
.lbl{font-size:10px;font-weight:700;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
input[type=number]{background:rgba(16,26,28,0.9);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:16px;outline:none;transition:border-color .2s;width:100%;text-align:center;letter-spacing:3px;color:var(--orange);font-weight:700}
input:focus{border-color:var(--orange)}
input::-webkit-inner-spin-button,input::-webkit-outer-spin-button{-webkit-appearance:none}
.range-row{display:flex;gap:8px;align-items:center}
.range-sep{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--dim);letter-spacing:2px}
.tip-box{background:rgba(255,107,0,0.06);border:1px solid rgba(255,107,0,0.2);border-radius:8px;padding:10px 12px;font-size:11px;color:rgba(255,150,50,0.8);line-height:1.5}
.tip-box strong{color:var(--orange)}
.found-count{text-align:center;font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:var(--orange);text-shadow:0 0 20px rgba(255,107,0,0.4)}
.btn{width:100%;padding:11px;border-radius:7px;border:none;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:900;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .18s}
.btn:disabled{opacity:0.3;cursor:not-allowed}
.btn-orange{background:linear-gradient(135deg,var(--orange),#cc4400);color:#fff;box-shadow:0 4px 20px rgba(255,107,0,0.35)}
.btn-orange:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 28px rgba(255,107,0,0.55)}
.btn-red{background:rgba(255,62,108,0.08);border:1px solid var(--red)!important;color:var(--red)}
.btn-red:hover:not(:disabled){background:rgba(255,62,108,0.18)}
hr{border:none;border-top:1px solid var(--border)}
.right{display:flex;flex-direction:column;padding:16px;gap:10px;overflow:hidden}
.banner{padding:8px 16px;border-radius:6px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-align:center;text-transform:uppercase;transition:all .3s}
.bi{background:rgba(16,26,28,0.8);border:1px solid var(--border);color:var(--dim)}
.bt{background:rgba(255,107,0,0.08);border:1px solid rgba(255,107,0,0.35);color:var(--orange);animation:bp 1.5s infinite}
.bd{background:rgba(255,107,0,0.06);border:1px solid rgba(255,107,0,0.3);color:var(--orange)}
.be{background:rgba(255,62,108,0.08);border:1px solid rgba(255,62,108,0.3);color:var(--red)}
@keyframes bp{0%,100%{opacity:1}50%{opacity:.6}}
.prog-box{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px 14px}
.prog-top{display:flex;justify-content:space-between;margin-bottom:6px}
.prog-lbl{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--dim);text-transform:uppercase}
.prog-pct{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--orange)}
.prog-sub{font-size:10px;color:var(--dim);margin-top:5px}
.prog-bg{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;width:0%;background:linear-gradient(to right,var(--orange),rgba(255,107,0,0.4));border-radius:3px;transition:width .3s;box-shadow:0 0 8px rgba(255,107,0,0.35)}
.found-box{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px;max-height:150px;overflow-y:auto}
.found-lbl{font-size:9px;font-family:'Orbitron',sans-serif;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:8px}
.found-pins{display:flex;flex-wrap:wrap;gap:6px}
.found-pin{background:rgba(255,107,0,0.12);border:1px solid rgba(255,107,0,0.4);border-radius:5px;padding:5px 12px;font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--orange);cursor:pointer;transition:all .15s;animation:pop .3s ease}
@keyframes pop{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
.found-pin:hover{background:rgba(255,107,0,0.22);box-shadow:0 0 10px rgba(255,107,0,0.3)}
.log-box{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:7px;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.log-top{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:rgba(12,18,20,.5);flex-shrink:0}
.log-lbl{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:3px;color:var(--dim);text-transform:uppercase;display:flex;align-items:center;gap:7px}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--orange);box-shadow:0 0 5px var(--orange);animation:pp 1s infinite}
.pulse.off{background:var(--dim);box-shadow:none;animation:none}
@keyframes pp{0%,100%{opacity:1}50%{opacity:.2}}
.clr-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:3px 9px;color:var(--dim);font-size:10px;cursor:pointer;font-family:'Rajdhani',sans-serif;text-transform:uppercase;letter-spacing:1px;transition:all .15s}
.clr-btn:hover{border-color:var(--orange);color:var(--orange)}
#log{flex:1;overflow-y:auto;padding:6px;font-family:'Share Tech Mono',monospace;font-size:11px;min-height:0}
#log::-webkit-scrollbar{width:3px}
.le{padding:2px 7px;border-radius:3px;display:flex;gap:8px;align-items:baseline;animation:fi .15s ease}
@keyframes fi{from{opacity:0;transform:translateX(-3px)}to{opacity:1;transform:none}}
.lt{color:var(--dim);flex-shrink:0;font-size:10px}.ln{color:var(--orange);flex-shrink:0;min-width:60px}.lm{flex:1}
.ok .lm{color:var(--orange)}.er .lm{color:var(--dim)}.in .lm{color:var(--yellow)}
</style></head>
<body>
<div class="scanline"></div>
<div class="wrap">
<div class="left">
  <div class="ph"><div class="ph-icon">🔍</div><div class="ph-title">PIN Scanner</div><a href="/" class="home-link">← HOME</a></div>
  <div>
    <div class="lbl">PIN Bereich</div>
    <div class="range-row">
      <input type="number" id="startPin" value="100000" min="1" max="9999999" placeholder="VON"/>
      <div class="range-sep">→</div>
      <input type="number" id="endPin" value="100200" min="1" max="9999999" placeholder="BIS"/>
    </div>
  </div>
  <div class="tip-box"><strong>⚠ Hinweis:</strong> Großer Bereich = lange Scan-Zeit (~0.2s pro PIN). 100 PINs ≈ 20 Sek.</div>
  <div style="text-align:center">
    <div style="font-size:10px;color:var(--dim);letter-spacing:2px;font-family:Orbitron,sans-serif;text-transform:uppercase;margin-bottom:5px">Gefunden</div>
    <div class="found-count" id="foundCount">0</div>
  </div>
  <hr/>
  <button class="btn btn-orange" id="btnGo" onclick="startScan()">🔍 SCAN STARTEN</button>
  <button class="btn btn-red" id="btnStop" onclick="stopScan()" disabled>■ SCAN STOPPEN</button>
</div>
<div class="right">
  <div id="banner" class="banner bi">● Bereit — PIN-Bereich eingeben und scannen</div>
  <div class="prog-box">
    <div class="prog-top"><div class="prog-lbl">Scan Progress</div><div class="prog-pct" id="pPct">0%</div></div>
    <div class="prog-sub" id="progSub">Warte auf Start...</div>
    <div class="prog-bg"><div class="prog-fill" id="pFill"></div></div>
  </div>
  <div class="found-box">
    <div class="found-lbl">Gefundene Sessions</div>
    <div class="found-pins" id="foundPins"><span style="font-size:11px;color:var(--dim);font-family:Share Tech Mono,monospace">Noch keine gefunden...</span></div>
  </div>
  <div class="log-box">
    <div class="log-top"><div class="log-lbl"><div class="pulse off" id="pulse"></div>Scan Log</div><button class="clr-btn" onclick="document.getElementById('log').innerHTML=''">Clear</button></div>
    <div id="log"></div>
  </div>
</div>
</div>
<script>
let foundPins=[],foundCount=0;
function addLog(n,m,c){const log=document.getElementById("log");const el=document.createElement("div");el.className="le "+(c||"");const t=new Date().toTimeString().slice(0,8);el.innerHTML='<span class="lt">'+t+'</span><span class="ln">'+n+'</span><span class="lm">'+m+'</span>';log.appendChild(el);log.scrollTop=log.scrollHeight;while(log.children.length>600)log.removeChild(log.firstChild);}
function setBanner(cls,txt){const b=document.getElementById("banner");b.className="banner "+cls;b.textContent=txt;}
const es=new EventSource("/events");
es.onmessage=function(e){const v=JSON.parse(e.data);
  if(v.type==="stats")return;
  if(v.type==="scan_start"){document.getElementById("pulse").className="pulse";document.getElementById("foundCount").textContent="0";document.getElementById("foundPins").innerHTML='<span style="font-size:11px;color:var(--dim);font-family:Share Tech Mono,monospace">Scanne...</span>';setBanner("bt","🔍 SCANNING: "+v.start+" → "+v.end);addLog("SCAN","Starte Scan: "+v.start+" bis "+v.end,"in");}
  else if(v.type==="scan_progress"){const pct=Math.round(v.checked/v.total*100);document.getElementById("pPct").textContent=pct+"%";document.getElementById("pFill").style.width=pct+"%";document.getElementById("progSub").textContent="Aktuell: "+v.current+" | "+v.checked+"/"+v.total+" geprüft";}
  else if(v.type==="scan_found"){foundCount++;document.getElementById("foundCount").textContent=foundCount;const fp=document.getElementById("foundPins");if(fp.querySelector("span"))fp.innerHTML="";const btn=document.createElement("div");btn.className="found-pin";btn.textContent=v.pin;btn.title="Klicken zum Botten";btn.onclick=()=>window.location.href="/botter?pin="+v.pin;fp.appendChild(btn);addLog("FOUND","✓ AKTIVE SESSION: "+v.pin,"ok");}
  else if(v.type==="scan_done"){document.getElementById("btnGo").disabled=false;document.getElementById("btnStop").disabled=true;document.getElementById("pulse").className="pulse off";setBanner("bd","✓ SCAN FERTIG — "+foundCount+" Sessions gefunden");addLog("SCAN","Scan abgeschlossen. "+foundCount+" Sessions gefunden.","in");}
  else if(v.type==="stopped"){document.getElementById("btnGo").disabled=false;document.getElementById("btnStop").disabled=true;document.getElementById("pulse").className="pulse off";setBanner("bi","Scan gestoppt");}
};
async function startScan(){
  const start=parseInt(document.getElementById("startPin").value);
  const end=parseInt(document.getElementById("endPin").value);
  if(!start||!end||start>=end){setBanner("be","⚠ Ungültiger Bereich!");return;}
  foundCount=0;foundPins=[];
  document.getElementById("btnGo").disabled=true;document.getElementById("btnStop").disabled=false;
  document.getElementById("pFill").style.width="0%";document.getElementById("pPct").textContent="0%";
  fetch("/start-scan",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({start,end})});
}
async function stopScan(){fetch("/stop",{method:"POST"});}
</script></body></html>
